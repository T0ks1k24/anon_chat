events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 1. Блок для редиректу з HTTP на HTTPS
    server {
        listen 80;
        server_name hkinfofab.online www.hkinfofab.online;

        # Перенаправляємо всі запити на HTTPS версію
        return 301 https://$host$request_uri;
    }

    # 2. Основний блок сервера на HTTPS
    server {
        listen 443 ssl;
        server_name hkinfofab.online www.hkinfofab.online;

        # Шляхи до сертифікатів (змонтовані з хост-машини через docker-compose)
        ssl_certificate /etc/letsencrypt/live/hkinfofab.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hkinfofab.online/privkey.pem;

        # Базові налаштування безпеки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend Next.js
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Кажемо бекенду, що ми працюємо через HTTPS
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Channels WebSockets
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
